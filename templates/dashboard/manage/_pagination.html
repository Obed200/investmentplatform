{% if page_obj.paginator.num_pages > 1 %}
<div class="pagination">
    {% if page_obj.has_previous %}
        <a class="btn ghost sm" href="?{% if q %}q={{ q }}&{% endif %}{% if status %}status={{ status }}&{% endif %}{% if type %}type={{ type }}&{% endif %}page={{ page_obj.previous_page_number }}">← Prev</a>
    {% endif %}
    <span class="page-info">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
        <a class="btn ghost sm" href="?{% if q %}q={{ q }}&{% endif %}{% if status %}status={{ status }}&{% endif %}{% if type %}type={{ type }}&{% endif %}page={{ page_obj.next_page_number }}">Next →</a>
    {% endif %}
</div>
{% endif %}
