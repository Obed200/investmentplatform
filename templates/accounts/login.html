{% extends 'base.html' %}

{% block title %}Login | Ribural{% endblock %}

{% block content %}
<section class="auth-panel">
    <div>
        <p class="eyebrow">Welcome back</p>
        <h1>Login</h1>
        <p>Access your wallet, investments, withdrawals, and referral center.</p>
    </div>
    <form method="post" class="form-card">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn primary full" type="submit">Login</button>
        <p class="muted">Need an account? <a href="{% url 'accounts:register' %}">Create one</a></p>
    </form>
</section>
{% endblock %}
