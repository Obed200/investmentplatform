{% extends 'base.html' %}

{% block title %}Create Account | Ribural{% endblock %}

{% block content %}
<section class="auth-panel">
    <div>
        <p class="eyebrow">Join Ribural</p>
        <h1>Create Account</h1>
        <p>Use your phone number to register and receive your personal referral code.</p>
    </div>
    <form method="post" class="form-card">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn primary full" type="submit">Create Account</button>
        <p class="muted">Already registered? <a href="{% url 'accounts:login' %}">Login</a></p>
    </form>
</section>
{% endblock %}
